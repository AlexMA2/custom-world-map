<div class="relative w-full h-full bg-black text-white font-sans overflow-hidden">
  
  <app-map-toolbar></app-map-toolbar>

  <!-- Space Background Stars (CSS Mock) -->
  <div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gray-800 via-gray-950 to-black pointer-events-none">
    <div class="stars-bg"></div>
  </div>

  <!-- Render Containers -->
  <div class="absolute inset-0 z-0" [class.hidden]="view() !== '3d'">
    <canvas #threeCanvas class="w-full h-full cursor-crosshair pointer-events-auto"></canvas>
  </div>
  
  <div class="absolute inset-0 z-0 flex items-center justify-center p-4 md:p-12 pointer-events-none" [class.hidden]="view() !== 'mercator' && view() !== 'equirectangular' && view() !== 'orthographic'">
    <canvas #d3Canvas class="w-full h-full max-w-full max-h-full md:max-w-6xl md:max-h-[85vh] cursor-crosshair bg-gray-900 rounded-2xl shadow-2xl border border-white/10 pointer-events-auto transition-all"></canvas>
  </div>
  
  <!-- UX Feedback Toast -->
  <div class="absolute top-20 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
    <div id="ux-toast" class="px-6 py-3 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white text-sm font-medium shadow-xl opacity-0 transition-all translate-y-4">
      <!-- Content set via JS -->
    </div>
  </div>

  <!-- Offscreen texture for 3D sphere -->
  <canvas #textureCanvas width="2048" height="1024" class="hidden"></canvas>
</div>
